name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: sidekar-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: sidekar-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: sidekar-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: sidekar-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install minisign
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install minisign
          else
            sudo apt-get update && sudo apt-get install -y minisign
          fi

      - name: Package extension
        run: |
          mkdir -p assets
          cd extension && zip -r ../assets/extension.zip . -x '*.test.*' 'generate_icons.py' 'README.md'

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/sidekar ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Sign binary
        env:
          MINISIGN_SECRET_KEY_B64: ${{ secrets.MINISIGN_SECRET_KEY_B64 }}
        run: |
          echo "$MINISIGN_SECRET_KEY_B64" | base64 --decode > /tmp/minisign.key
          echo | minisign -S -s /tmp/minisign.key -m ${{ matrix.name }}.tar.gz
          rm /tmp/minisign.key

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.minisig
          generate_release_notes: true
