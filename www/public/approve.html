<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Device — sidekar</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-dark.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #09090b;
  --bg-subtle: #18181b;
  --bg-muted: #27272a;
  --border: #27272a;
  --border-subtle: #3f3f46;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #e4e4e7;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  max-width: 420px;
  width: 100%;
  margin: 24px;
  text-align: center;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.logo-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
}

.subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 32px;
}

label {
  display: block;
  text-align: left;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

input[type="text"] {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 20px;
  letter-spacing: 0.15em;
  text-align: center;
  text-transform: uppercase;
  outline: none;
  transition: border-color 0.15s;
}

input[type="text"]::placeholder {
  color: var(--text-muted);
  font-size: 16px;
  letter-spacing: 0.1em;
  text-transform: none;
}

input[type="text"]:focus {
  border-color: var(--accent);
}

button {
  width: 100%;
  margin-top: 16px;
  padding: 12px 24px;
  background: var(--text);
  color: var(--bg);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.15s;
}

button:hover { opacity: 0.9; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.message {
  margin-top: 16px;
  font-size: 14px;
  min-height: 20px;
}

.message.error { color: #ef4444; }
.message.success { color: #22c55e; }

.loading {
  display: none;
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 24px;
}

#auth-loading {
  display: block;
}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/sidekar-icon-dark.svg" alt="" class="logo-icon">sidekar</div>
    <div class="subtitle">Authorize your device</div>

    <div id="auth-loading" class="loading">Checking authentication...</div>

    <form id="approve-form" style="display: none;">
      <label for="code-input">Enter the code shown in your terminal</label>
      <input type="text" id="code-input" placeholder="ABCD-1234" maxlength="9" autocomplete="off" autofocus>
      <button type="submit" id="submit-btn">Approve Device</button>
      <div id="message" class="message"></div>
    </form>
  </div>

  <script src="/js/approve.js"></script>
</body>
</html>
