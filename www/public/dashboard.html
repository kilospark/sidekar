<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard: sidekar</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-light.svg" media="(prefers-color-scheme: light)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<script>
(function() {
  var stored = localStorage.getItem('theme');
  if (stored === 'light') document.documentElement.classList.add('light');
  else if (stored === 'dark') document.documentElement.classList.add('dark');
})();
</script>
<style>
/* Page-specific: main container padding override */
main.container {
  padding: 32px 24px;
}

.dash-lead {
  font-size: 18px;
  color: var(--text-secondary);
  margin-bottom: 28px;
  line-height: 1.5;
}

.dash-lead strong {
  color: var(--text);
  font-weight: 600;
}

.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

.dash-card {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.dash-card-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}

.dash-card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.dash-card-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}

.dash-card-cta {
  display: inline-block;
  align-self: flex-start;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}

.dash-card-cta:hover {
  border-color: var(--border-subtle);
  color: var(--text);
  background: var(--bg-muted);
}

.dash-hint {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.55;
  padding-top: 4px;
  border-top: 1px solid var(--border);
}

.dash-hint p {
  margin: 0;
}

.dash-hint strong {
  color: var(--text-secondary);
  font-weight: 600;
}

.dash-hint code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--bg-muted);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--text);
}

.dash-hint a {
  color: var(--text-secondary);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.dash-hint a:hover {
  color: var(--text);
}

/* Page-specific empty-state override */
.empty-state {
  padding: 48px 24px;
}
</style>
</head>
<body>
  <nav>
    <div class="container">
      <div class="nav-left">
        <a href="/" class="nav-logo">
          <img src="/sidekar-icon-dark.svg" alt="" class="nav-logo-icon dark">
          <img src="/sidekar-icon-light.svg" alt="" class="nav-logo-icon light">
          sidekar
        </a>
        <div class="nav-dash-links">
          <a href="/dashboard" class="nav-dash-link active">Dashboard</a>
          <a href="/sessions" class="nav-dash-link">Sessions</a>
          <a href="/devices" class="nav-dash-link">Devices</a>
        </div>
      </div>
      <div class="nav-right">
        <span class="user-info" id="user-info"></span>
        <button class="btn-logout" id="logout-btn">Log out</button>
        <button class="theme-toggle" id="theme-toggle" onclick="cycleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-system" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div id="content">
      <div class="loading">Loading dashboard...</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-left">&copy; 2026 Kilo Spark</div>
      <ul class="footer-links">
        <li><a href="/terms">Terms</a></li>
        <li><a href="/privacy">Privacy</a></li>
      </ul>
    </div>
  </footer>

  <script>
  var themeModes = ['light', 'system', 'dark'];
  function setTheme(mode) {
    var html = document.documentElement;
    html.classList.remove('light', 'dark');
    if (mode === 'light') html.classList.add('light');
    else if (mode === 'dark') html.classList.add('dark');
    if (mode === 'system') localStorage.removeItem('theme');
    else localStorage.setItem('theme', mode);
    var btn = document.getElementById('theme-toggle');
    if (btn) btn.setAttribute('data-mode', mode);
  }
  function cycleTheme() {
    var current = localStorage.getItem('theme') || 'system';
    var idx = themeModes.indexOf(current);
    var next = themeModes[(idx + 1) % themeModes.length];
    setTheme(next);
  }
  (function() {
    var stored = localStorage.getItem('theme') || 'system';
    var btn = document.getElementById('theme-toggle');
    if (btn) btn.setAttribute('data-mode', stored);
  })();
  </script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
