<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sidekar: terminal</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-light.svg" media="(prefers-color-scheme: light)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
<script>
(function() {
  var stored = localStorage.getItem('theme');
  if (stored === 'light') document.documentElement.classList.add('light');
  else if (stored === 'dark') document.documentElement.classList.add('dark');
})();
</script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bar-bg: rgba(9, 9, 11, 0.9);
  --bar-border: #27272a;
  --bar-text: #71717a;
  --bar-text-hover: #a1a1aa;
}

@media (prefers-color-scheme: light) {
  :root:not(.dark) {
    --bar-bg: rgba(255, 255, 255, 0.9);
    --bar-border: #e4e4e7;
    --bar-text: #71717a;
    --bar-text-hover: #52525b;
  }
}

html.light {
  --bar-bg: rgba(255, 255, 255, 0.9);
  --bar-border: #e4e4e7;
  --bar-text: #71717a;
  --bar-text-hover: #52525b;
}

html.dark {
  --bar-bg: rgba(9, 9, 11, 0.9);
  --bar-border: #27272a;
  --bar-text: #71717a;
  --bar-text-hover: #a1a1aa;
}

body {
  background: #09090b;
  overflow: hidden;
}

/* Fixed terminal layout may need scroll on small viewports */
body.terminal-layout-fixed {
  overflow: auto;
}

#status-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  background: var(--bar-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--bar-border);
  z-index: 10;
  font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12px;
}

#back-link {
  color: var(--bar-text);
  text-decoration: none;
  transition: color 0.15s;
}

#back-link:hover {
  color: var(--bar-text-hover);
}

#status {
  color: var(--bar-text);
  display: flex;
  align-items: center;
  gap: 6px;
}

#status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--bar-text);
  display: inline-block;
}

#status-dot.connected {
  background: #22c55e;
}

#status-dot.error {
  background: #ef4444;
}

#layout-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--bar-text);
  font-size: 11px;
  cursor: pointer;
  user-select: none;
}

#layout-toggle input {
  cursor: pointer;
}

#terminal-wrap {
  margin-top: 32px;
  min-height: calc(100vh - 32px);
}

#terminal-wrap.layout-adaptive #terminal {
  width: 100%;
  height: calc(100vh - 32px);
}

#terminal-wrap.layout-fixed {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 12px;
  box-sizing: border-box;
}

#terminal-wrap.layout-fixed #terminal {
  width: auto;
  height: auto;
  flex: 0 0 auto;
}
</style>
</head>
<body>
  <div id="status-bar">
    <a id="back-link" href="/dashboard">&larr; dashboard</a>
    <label id="layout-toggle" title="Adaptive: xterm fills the window. Fixed: 80×24 cells (typical terminal), centered.">
      <input type="checkbox" id="layout-adaptive" checked />
      <span>Fit terminal to browser</span>
    </label>
    <div id="status"><span id="status-dot"></span> <span id="status-text">connecting...</span></div>
  </div>
  <div id="terminal-wrap" class="layout-adaptive">
    <div id="terminal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-serialize@0/lib/addon-serialize.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0/lib/addon-web-links.js"></script>
  <script src="/js/terminal.js"></script>
</body>
</html>
