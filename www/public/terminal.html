<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sidekar — terminal</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-dark.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #09090b;
  overflow: hidden;
}

#terminal {
  width: 100vw;
  height: 100vh;
}

#status-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  background: rgba(9, 9, 11, 0.9);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid #27272a;
  z-index: 10;
  font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12px;
}

#back-link {
  color: #71717a;
  text-decoration: none;
  transition: color 0.15s;
}

#back-link:hover {
  color: #a1a1aa;
}

#status {
  color: #71717a;
  display: flex;
  align-items: center;
  gap: 6px;
}

#status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #71717a;
  display: inline-block;
}

#status-dot.connected {
  background: #22c55e;
}

#status-dot.error {
  background: #ef4444;
}
</style>
</head>
<body>
  <div id="status-bar">
    <a id="back-link" href="/sessions">&larr; sessions</a>
    <div id="status"><span id="status-dot"></span> <span id="status-text">connecting...</span></div>
  </div>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0/lib/addon-web-links.js"></script>
  <script src="/js/terminal.js"></script>
</body>
</html>
