<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sidekar: terminal</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-light.svg" media="(prefers-color-scheme: light)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
<script>
(function() {
  var stored = localStorage.getItem('theme');
  if (stored === 'light') document.documentElement.classList.add('light');
  else if (stored === 'dark') document.documentElement.classList.add('dark');
})();
</script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bar-bg: #0a0a0a;
  --bar-border: #262626;
  --bar-text: #a3a3a3;
  --bar-text-hover: #f5f5f5;
}

@media (prefers-color-scheme: light) {
  :root:not(.dark) {
    --bar-bg: #ffffff;
    --bar-border: #d4d4d4;
    --bar-text: #737373;
    --bar-text-hover: #111111;
  }
}

html.light {
  --bar-bg: #ffffff;
  --bar-border: #d4d4d4;
  --bar-text: #737373;
  --bar-text-hover: #111111;
}

html.dark {
  --bar-bg: #0a0a0a;
  --bar-border: #262626;
  --bar-text: #a3a3a3;
  --bar-text-hover: #f5f5f5;
}

body {
  background: #09090b;
  overflow: hidden;
}

#status-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  background: var(--bar-bg);
  border-bottom: 1px solid var(--bar-border);
  z-index: 10;
  font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12px;
}

#back-link {
  color: var(--bar-text);
  text-decoration: none;
}

#back-link:hover {
  color: var(--bar-text-hover);
}

#status {
  color: var(--bar-text);
  display: flex;
  align-items: center;
  gap: 6px;
}

#status-dot {
  width: 6px;
  height: 6px;
  border-radius: 0;
  background: var(--bar-text);
  display: inline-block;
}

#status-dot.connected {
  background: var(--bar-text-hover);
}

#status-dot.error {
  background: var(--bar-text-hover);
}

#terminal-wrap {
  position: fixed;
  top: 32px;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 12px 0;
  overflow: auto;
  text-align: center;
}

#terminal {
  display: inline-block;
  text-align: left;
}
</style>
</head>
<body>
  <div id="status-bar">
    <a id="back-link" href="/dashboard">&larr; dashboard</a>
    <div id="status"><span id="status-dot"></span> <span id="status-text">connecting...</span></div>
  </div>
  <div id="terminal-wrap">
    <div id="terminal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0/lib/addon-web-links.js"></script>
  <script src="/js/terminal.js"></script>
</body>
</html>
