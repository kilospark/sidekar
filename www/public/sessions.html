<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions — sidekar</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="/sidekar-icon-light.svg" media="(prefers-color-scheme: light)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function() {
  var stored = localStorage.getItem('theme');
  if (stored === 'light') document.documentElement.classList.add('light');
  else if (stored === 'dark') document.documentElement.classList.add('dark');
})();
</script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #09090b;
  --bg-subtle: #18181b;
  --bg-muted: #27272a;
  --border: #27272a;
  --border-subtle: #3f3f46;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #e4e4e7;
  --nav-bg: rgba(9, 9, 11, 0.8);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
}

@media (prefers-color-scheme: light) {
  :root:not(.dark) {
    --bg: #ffffff;
    --bg-subtle: #f4f4f5;
    --bg-muted: #e4e4e7;
    --border: #e4e4e7;
    --border-subtle: #d4d4d8;
    --text: #09090b;
    --text-secondary: #52525b;
    --text-muted: #71717a;
    --accent: #27272a;
    --nav-bg: rgba(255, 255, 255, 0.8);
  }
}

html.light {
  --bg: #ffffff;
  --bg-subtle: #f4f4f5;
  --bg-muted: #e4e4e7;
  --border: #e4e4e7;
  --border-subtle: #d4d4d8;
  --text: #09090b;
  --text-secondary: #52525b;
  --text-muted: #71717a;
  --accent: #27272a;
  --nav-bg: rgba(255, 255, 255, 0.8);
}

html.dark {
  --bg: #09090b;
  --bg-subtle: #18181b;
  --bg-muted: #27272a;
  --border: #27272a;
  --border-subtle: #3f3f46;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #e4e4e7;
  --nav-bg: rgba(9, 9, 11, 0.8);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

/* Nav */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

nav .container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 24px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  text-decoration: none;
}

.nav-logo-icon {
  width: 24px;
  height: 24px;
  border-radius: 5px;
}

.nav-logo-icon.dark { display: block; }
.nav-logo-icon.light { display: none; }

@media (prefers-color-scheme: light) {
  :root:not(.dark) .nav-logo-icon.dark { display: none; }
  :root:not(.dark) .nav-logo-icon.light { display: block; }
}

html.light .nav-logo-icon.dark { display: none; }
html.light .nav-logo-icon.light { display: block; }
html.dark .nav-logo-icon.dark { display: block; }
html.dark .nav-logo-icon.light { display: none; }

.page-title {
  font-size: 14px;
  color: var(--text-muted);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.user-info {
  font-size: 13px;
  color: var(--text-muted);
}

.user-info .username {
  color: var(--text-secondary);
  font-weight: 500;
}

.btn-logout {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}

.btn-logout:hover {
  border-color: var(--border-subtle);
  color: var(--text-secondary);
}

.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-subtle);
  cursor: pointer;
  color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
}

.theme-toggle:hover {
  color: var(--text-secondary);
  background: var(--bg-muted);
}

.theme-toggle svg {
  width: 16px;
  height: 16px;
}

.theme-toggle .icon-light,
.theme-toggle .icon-system,
.theme-toggle .icon-dark { display: none; }

.theme-toggle[data-mode="light"] .icon-light { display: block; }
.theme-toggle[data-mode="system"] .icon-system { display: block; }
.theme-toggle[data-mode="dark"] .icon-dark { display: block; }

/* Footer */
footer {
  padding: 40px 0;
  border-top: 1px solid var(--border);
}

footer .container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-left {
  font-size: 13px;
  color: var(--text-muted);
}

/* Content */
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 32px 24px;
}

.refresh-note {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* Session cards */
.sessions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.session-card {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  text-decoration: none;
  display: block;
  color: inherit;
}

.session-card:hover {
  border-color: var(--border-subtle);
  background: var(--bg-muted);
}

.session-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.agent-badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-muted);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.session-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-muted);
}

.session-meta-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.session-meta-row .label {
  color: var(--text-muted);
  min-width: 60px;
}

.session-meta-row .value {
  color: var(--text-secondary);
  font-family: var(--mono);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.session-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
}

.viewer-count {
  display: flex;
  align-items: center;
  gap: 4px;
}

.viewer-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  display: inline-block;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 24px;
}

.empty-state h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

.empty-state p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 8px;
}

.empty-state code {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 20px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
}

/* Loading */
.loading {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
  font-size: 14px;
}
</style>
</head>
<body>
  <nav>
    <div class="container">
      <div class="nav-left">
        <a href="/" class="nav-logo">
          <img src="/sidekar-icon-dark.svg" alt="" class="nav-logo-icon dark">
          <img src="/sidekar-icon-light.svg" alt="" class="nav-logo-icon light">
          sidekar
        </a>
        <span class="page-title">Sessions</span>
      </div>
      <div class="nav-right">
        <span class="user-info" id="user-info"></span>
        <button class="btn-logout" id="logout-btn">Log out</button>
        <button class="theme-toggle" id="theme-toggle" onclick="cycleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-system" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="refresh-note" id="refresh-note"></div>
    <div id="content">
      <div class="loading">Loading sessions...</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-left">&copy; 2026 Kilo Spark</div>
    </div>
  </footer>

  <script>
  var themeModes = ['light', 'system', 'dark'];
  function setTheme(mode) {
    var html = document.documentElement;
    html.classList.remove('light', 'dark');
    if (mode === 'light') html.classList.add('light');
    else if (mode === 'dark') html.classList.add('dark');
    if (mode === 'system') localStorage.removeItem('theme');
    else localStorage.setItem('theme', mode);
    var btn = document.getElementById('theme-toggle');
    if (btn) btn.setAttribute('data-mode', mode);
  }
  function cycleTheme() {
    var current = localStorage.getItem('theme') || 'system';
    var idx = themeModes.indexOf(current);
    var next = themeModes[(idx + 1) % themeModes.length];
    setTheme(next);
  }
  (function() {
    var stored = localStorage.getItem('theme') || 'system';
    var btn = document.getElementById('theme-toggle');
    if (btn) btn.setAttribute('data-mode', stored);
  })();
  </script>
  <script src="/js/sessions.js"></script>
</body>
</html>
