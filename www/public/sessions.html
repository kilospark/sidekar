<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions — sidekar</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #09090b;
  --bg-subtle: #18181b;
  --bg-muted: #27272a;
  --border: #27272a;
  --border-subtle: #3f3f46;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #e4e4e7;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(9, 9, 11, 0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 24px;
}

.logo {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  text-decoration: none;
}

.page-title {
  font-size: 14px;
  color: var(--text-muted);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.user-info {
  font-size: 13px;
  color: var(--text-muted);
}

.user-info .username {
  color: var(--text-secondary);
  font-weight: 500;
}

.btn-logout {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}

.btn-logout:hover {
  border-color: var(--border-subtle);
  color: var(--text-secondary);
}

/* Content */
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 32px 24px;
}

.refresh-note {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* Session cards */
.sessions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.session-card {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  text-decoration: none;
  display: block;
  color: inherit;
}

.session-card:hover {
  border-color: var(--border-subtle);
  background: var(--bg-muted);
}

.session-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.agent-badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-muted);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.session-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-muted);
}

.session-meta-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.session-meta-row .label {
  color: var(--text-muted);
  min-width: 60px;
}

.session-meta-row .value {
  color: var(--text-secondary);
  font-family: var(--mono);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.session-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
}

.viewer-count {
  display: flex;
  align-items: center;
  gap: 4px;
}

.viewer-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  display: inline-block;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 24px;
}

.empty-state h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

.empty-state p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 8px;
}

.empty-state code {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 20px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
}

/* Loading */
.loading {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
  font-size: 14px;
}
</style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" class="logo">sidekar</a>
        <span class="page-title">Sessions</span>
      </div>
      <div class="header-right">
        <span class="user-info" id="user-info"></span>
        <button class="btn-logout" id="logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="refresh-note" id="refresh-note"></div>
    <div id="content">
      <div class="loading">Loading sessions...</div>
    </div>
  </main>

  <script src="/js/sessions.js"></script>
</body>
</html>
