<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sidekar - Extension Auth</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fafafa;
  color: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  padding: 40px;
  max-width: 420px;
  width: 100%;
  text-align: center;
}
h1 { font-size: 20px; margin-bottom: 8px; }
.icon { font-size: 48px; margin-bottom: 16px; }
.subtitle { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
.status { font-size: 14px; margin-top: 16px; }
.status.success { color: #166534; }
.status.error { color: #991b1b; }
.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid #e5e5e5;
  border-top-color: #333;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#ext-token { display: none; }
</style>
</head>
<body>
<div class="card">
  <div id="loading">
    <div class="spinner"></div>
    <h1>Connecting extension...</h1>
    <p class="subtitle">Generating your extension token.</p>
  </div>
  <div id="success" style="display:none;">
    <div class="icon">&#10003;</div>
    <h1>Extension authenticated</h1>
    <p class="subtitle">You can close this tab. The Sidekar extension is now connected to your account.</p>
    <div id="ext-token" data-token=""></div>
  </div>
  <div id="error-view" style="display:none;">
    <div class="icon">&#10007;</div>
    <h1>Authentication failed</h1>
    <p class="subtitle" id="error-msg">Something went wrong. Please try again from the extension popup.</p>
  </div>
</div>
<script>
(async function() {
  const loadingEl = document.getElementById("loading");
  const successEl = document.getElementById("success");
  const errorEl = document.getElementById("error-view");
  const errorMsg = document.getElementById("error-msg");
  const tokenEl = document.getElementById("ext-token");

  function showError(msg) {
    loadingEl.style.display = "none";
    errorEl.style.display = "block";
    errorMsg.textContent = msg;
  }

  function showSuccess(token) {
    loadingEl.style.display = "none";
    successEl.style.display = "block";
    tokenEl.setAttribute("data-token", token);
    tokenEl.style.display = "block";
    // Also broadcast via postMessage for the extension to pick up
    window.postMessage({ type: "sidekar-ext-token", token: token }, "*");
  }

  try {
    const resp = await fetch("/api/auth/ext-token", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
    });

    if (resp.status === 401) {
      showError("Not logged in. Please log in to sidekar.dev first, then try again from the extension.");
      return;
    }

    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      showError(data.error || "Failed to generate token. Please try again.");
      return;
    }

    const data = await resp.json();
    if (data.token) {
      showSuccess(data.token);
    } else {
      showError("No token received. Please try again.");
    }
  } catch (e) {
    showError("Network error. Please check your connection and try again.");
  }
})();
</script>
</body>
</html>
