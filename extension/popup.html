<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; color: #333; }
h3 { margin: 0 0 12px; font-size: 14px; }
#status { padding: 6px 10px; border-radius: 4px; margin-bottom: 12px; font-size: 12px; }
.connected { background: #dcfce7; color: #166534; }
.disconnected { background: #fef2f2; color: #991b1b; }
.pending { background: #fef9c3; color: #854d0e; }
#detail { font-size: 11px; color: #991b1b; margin: -4px 0 10px; line-height: 1.35; min-height: 2.7em; }
label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
input { width: 100%; padding: 6px 8px; border: 1px solid #d4d4d8; border-radius: 4px; font-family: monospace; font-size: 11px; box-sizing: border-box; margin-bottom: 8px; }
button { width: 100%; padding: 8px; border: 1px solid #d4d4d8; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; margin-bottom: 6px; }
button:hover { background: #f4f4f5; }
#login-btn { background: #24292f; color: #fff; border-color: #24292f; }
#login-btn:hover { background: #32383f; }
#logout-btn { font-size: 11px; color: #666; border: none; padding: 4px; }
#logout-btn:hover { color: #991b1b; background: transparent; }
.hint { font-size: 11px; color: #999; margin-top: 8px; }
code { background: #f4f4f5; padding: 1px 4px; border-radius: 2px; font-size: 11px; }
.user-info { font-size: 12px; color: #166534; margin-bottom: 8px; padding: 6px 8px; background: #f0fdf4; border-radius: 4px; }
.section { margin-bottom: 12px; }
#auth-section { display: block; }
#logged-in-section { display: none; }
details { margin-top: 8px; }
details summary { font-size: 11px; color: #999; cursor: pointer; }
details summary:hover { color: #666; }
details .inner { margin-top: 8px; }
</style>
</head>
<body>
<h3>Sidekar</h3>
<div id="status" class="disconnected">Checking...</div>
<div id="detail"></div>

<div id="auth-section">
  <button id="login-btn">Login with GitHub</button>
  <details>
    <summary>Advanced: manual secret</summary>
    <div class="inner">
      <label>Secret</label>
      <input id="secret" type="text" placeholder="Run: sidekar ext secret" />
      <button id="save-secret">Connect with secret</button>
    </div>
  </details>
</div>

<div id="logged-in-section">
  <div class="user-info" id="user-info">Authenticated via GitHub</div>
  <button id="logout-btn">Sign out</button>
</div>

<div class="section">
  <label>Bridge port</label>
  <input id="port" type="number" min="1" max="65535" value="9876" />
  <button id="save-port">Update port</button>
</div>

<div class="hint">The bridge must be running on your Mac. In Terminal: <code>sidekar ext tabs</code> or <code>sidekar ext-server</code>.</div>
<div id="endpoint" class="hint"></div>
<script src="popup.js"></script>
</body>
</html>
