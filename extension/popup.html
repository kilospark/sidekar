<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; color: #333; }
h3 { margin: 0 0 12px; font-size: 14px; }
.status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.status-label { font-size: 11px; color: #666; min-width: 55px; }
#status, #ext-status { flex: 1; padding: 6px 10px; border-radius: 4px; font-size: 12px; }
.connected { background: #dcfce7; color: #166534; }
.disconnected { background: #fef2f2; color: #991b1b; }
.pending { background: #fef9c3; color: #854d0e; }
#detail { font-size: 11px; color: #991b1b; margin: 0 0 10px 63px; line-height: 1.35; min-height: 1em; }
button { width: 100%; padding: 8px; border: 1px solid #d4d4d8; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; margin-bottom: 6px; }
button:hover { background: #f4f4f5; }
#login-btn { background: #24292f; color: #fff; border-color: #24292f; }
#login-btn:hover { background: #32383f; }
#logout-btn { font-size: 12px; color: #666; border: 1px solid #d4d4d8; padding: 6px; background: #fff; }
#logout-btn:hover { color: #991b1b; border-color: #991b1b; background: #fef2f2; }
.hint { font-size: 11px; color: #999; margin-top: 8px; }
code { background: #f4f4f5; padding: 1px 4px; border-radius: 2px; font-size: 11px; }
.cmd-copy { display: inline-flex; align-items: center; gap: 4px; background: #f4f4f5; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-family: ui-monospace, monospace; font-size: 11px; color: #333; border: 1px solid #e4e4e7; }
.cmd-copy:hover { background: #e4e4e7; }
.cmd-copy svg { width: 12px; height: 12px; color: #666; flex-shrink: 0; }
.cmd-copy.copied svg { color: #16a34a; }
#auth-section { display: block; }
#logged-in-section { display: none; }
</style>
</head>
<body>
<h3 style="display:flex;align-items:center;gap:6px;"><img src="icons/icon-light-48.png" width="20" height="20" alt="">sidekar<span id="version" style="margin-left:auto;font-weight:normal;font-size:11px;color:#999;"></span></h3>
<div class="status-row"><span class="status-label">CLI</span><span id="status" class="disconnected">Checking...</span></div>
<div id="detail"></div>
<button id="retry-btn" style="display:none; font-size:11px; padding:4px; margin-bottom:8px;">Retry connection</button>

<div class="status-row"><span class="status-label">Extension</span><span id="ext-status" class="disconnected">Not signed in</span></div>

<div id="auth-section">
  <button id="login-btn">Login with GitHub</button>
</div>

<div id="logged-in-section">
  <button id="logout-btn">Sign out</button>
</div>

<div class="hint" style="display:none"></div>
<script src="popup.js"></script>
</body>
</html>
